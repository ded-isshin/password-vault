{{- if .Values.syntheticCleanup.cronJob.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "password-vault.fullname" . }}-synthetic-cleanup
  namespace: {{ include "password-vault.namespace" . }}
  labels:
    {{- include "password-vault.labels" . | nindent 4 }}
    component: synthetic-cleanup
  {{- with .Values.syntheticCleanup.cronJob.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  schedule: {{ .Values.syntheticCleanup.cronJob.schedule | quote }}
  {{- with .Values.syntheticCleanup.cronJob.timeZone }}
  timeZone: {{ . | quote }}
  {{- end }}
  suspend: {{ .Values.syntheticCleanup.cronJob.suspend }}
  concurrencyPolicy: {{ .Values.syntheticCleanup.cronJob.concurrencyPolicy }}
  {{- with .Values.syntheticCleanup.cronJob.startingDeadlineSeconds }}
  startingDeadlineSeconds: {{ . }}
  {{- end }}
  successfulJobsHistoryLimit: {{ .Values.syntheticCleanup.cronJob.successfulJobsHistoryLimit }}
  failedJobsHistoryLimit: {{ .Values.syntheticCleanup.cronJob.failedJobsHistoryLimit }}
  jobTemplate:
    metadata:
      labels:
        {{- include "password-vault.labels" . | nindent 8 }}
        component: synthetic-cleanup
    spec:
      backoffLimit: {{ .Values.syntheticCleanup.cronJob.backoffLimit }}
      activeDeadlineSeconds: {{ .Values.syntheticCleanup.cronJob.activeDeadlineSeconds }}
      {{- with .Values.syntheticCleanup.cronJob.ttlSecondsAfterFinished }}
      ttlSecondsAfterFinished: {{ . }}
      {{- end }}
      template:
        metadata:
          labels:
            {{- include "password-vault.labels" . | nindent 12 }}
            component: synthetic-cleanup
        spec:
          restartPolicy: Never
          automountServiceAccountToken: false
          securityContext:
            {{- toYaml .Values.podSecurityContext | nindent 12 }}
          {{- with .Values.imagePullSecrets }}
          imagePullSecrets:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          containers:
            - name: cleanup-synthetic
              image: {{ include "password-vault.image" . | quote }}
              imagePullPolicy: {{ .Values.image.pullPolicy }}
              args:
                - cleanup-synthetic
                {{- if .Values.syntheticCleanup.cronJob.confirm }}
                - --confirm
                {{- else }}
                - --dry-run
                {{- end }}
              securityContext:
                {{- toYaml .Values.containerSecurityContext | nindent 16 }}
              env:
                - name: RUST_LOG
                  value: {{ .Values.config.rustLog | quote }}
                {{- if .Values.tmp.enabled }}
                - name: TMPDIR
                  value: {{ .Values.tmp.mountPath | quote }}
                {{- end }}
                - name: PV_DATABASE_URL
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.database.urlSecret.name }}
                      key: {{ .Values.database.urlSecret.key }}
                - name: PV_SYNTHETIC_CLEANUP_PREFIX
                  value: {{ .Values.syntheticCleanup.cronJob.prefix | quote }}
                - name: PV_SYNTHETIC_CLEANUP_DOMAIN
                  value: {{ .Values.syntheticCleanup.cronJob.domain | quote }}
                - name: PV_SYNTHETIC_CLEANUP_MIN_AGE_HOURS
                  value: {{ .Values.syntheticCleanup.cronJob.minAgeHours | quote }}
                - name: PV_SYNTHETIC_CLEANUP_MAX_DELETE
                  value: {{ .Values.syntheticCleanup.cronJob.maxDelete | quote }}
              resources:
                {{- toYaml .Values.syntheticCleanup.cronJob.resources | nindent 16 }}
              {{- if .Values.tmp.enabled }}
              volumeMounts:
                - name: tmp
                  mountPath: {{ .Values.tmp.mountPath | quote }}
              {{- end }}
          {{- if .Values.tmp.enabled }}
          volumes:
            - name: tmp
              emptyDir:
                sizeLimit: {{ .Values.tmp.sizeLimit | quote }}
          {{- end }}
{{- end }}
