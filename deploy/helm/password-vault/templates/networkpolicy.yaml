{{- if .Values.networkPolicy.enabled }}
{{- $databasePodSelector := .Values.networkPolicy.database.podSelector }}
{{- if .Values.networkPolicy.database.podSelectorOverride }}
{{- $databasePodSelector = .Values.networkPolicy.database.podSelectorOverride }}
{{- end }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "password-vault.fullname" . }}-api
  namespace: {{ include "password-vault.namespace" . }}
  labels:
    {{- include "password-vault.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "password-vault.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    {{- if .Values.networkPolicy.http.ingressIPBlocks }}
    - from:
        {{- range .Values.networkPolicy.http.ingressIPBlocks }}
        - ipBlock:
            cidr: {{ . | quote }}
        {{- end }}
      ports:
        - protocol: TCP
          port: http
    {{- else if .Values.networkPolicy.http.allowAllIngress }}
    - ports:
        - protocol: TCP
          port: http
    {{- end }}
    - from:
        - namespaceSelector:
            {{- toYaml .Values.networkPolicy.metrics.namespaceSelector | nindent 12 }}
          podSelector:
            {{- toYaml .Values.networkPolicy.metrics.podSelector | nindent 12 }}
      ports:
        - protocol: TCP
          port: metrics
  egress:
    - to:
        - podSelector:
            {{- toYaml $databasePodSelector | nindent 12 }}
      ports:
        - protocol: TCP
          port: {{ .Values.networkPolicy.database.port }}
    {{- if .Values.networkPolicy.dns.enabled }}
    - to:
        - namespaceSelector:
            {{- toYaml .Values.networkPolicy.dns.kubeDns.namespaceSelector | nindent 12 }}
          podSelector:
            {{- toYaml .Values.networkPolicy.dns.kubeDns.podSelector | nindent 12 }}
      ports:
        - protocol: UDP
          port: {{ .Values.networkPolicy.dns.port }}
        - protocol: TCP
          port: {{ .Values.networkPolicy.dns.port }}
    {{- if .Values.networkPolicy.dns.nodeLocal.enabled }}
    - to:
        - ipBlock:
            cidr: {{ .Values.networkPolicy.dns.nodeLocal.cidr | quote }}
      ports:
        - protocol: UDP
          port: {{ .Values.networkPolicy.dns.port }}
        - protocol: TCP
          port: {{ .Values.networkPolicy.dns.port }}
    {{- end }}
    {{- end }}
{{- if .Values.syntheticCleanup.cronJob.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "password-vault.fullname" . }}-synthetic-cleanup
  namespace: {{ include "password-vault.namespace" . }}
  labels:
    {{- include "password-vault.labels" . | nindent 4 }}
    component: synthetic-cleanup
spec:
  podSelector:
    matchLabels:
      # Keep this selector aligned with the infrastructure CNPG ingress allow-list.
      {{- include "password-vault.baseSelectorLabels" . | nindent 6 }}
      component: synthetic-cleanup
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            {{- toYaml $databasePodSelector | nindent 12 }}
      ports:
        - protocol: TCP
          port: {{ .Values.networkPolicy.database.port }}
    {{- if .Values.networkPolicy.dns.enabled }}
    - to:
        - namespaceSelector:
            {{- toYaml .Values.networkPolicy.dns.kubeDns.namespaceSelector | nindent 12 }}
          podSelector:
            {{- toYaml .Values.networkPolicy.dns.kubeDns.podSelector | nindent 12 }}
      ports:
        - protocol: UDP
          port: {{ .Values.networkPolicy.dns.port }}
        - protocol: TCP
          port: {{ .Values.networkPolicy.dns.port }}
    {{- if .Values.networkPolicy.dns.nodeLocal.enabled }}
    - to:
        - ipBlock:
            cidr: {{ .Values.networkPolicy.dns.nodeLocal.cidr | quote }}
      ports:
        - protocol: UDP
          port: {{ .Values.networkPolicy.dns.port }}
        - protocol: TCP
          port: {{ .Values.networkPolicy.dns.port }}
    {{- end }}
    {{- end }}
{{- end }}
{{- if .Values.syntheticJourney.cronJob.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "password-vault.fullname" . }}-synthetic-journey
  namespace: {{ include "password-vault.namespace" . }}
  labels:
    {{- include "password-vault.labels" . | nindent 4 }}
    component: synthetic-journey
spec:
  podSelector:
    matchLabels:
      {{- include "password-vault.baseSelectorLabels" . | nindent 6 }}
      component: synthetic-journey
  policyTypes:
    - Egress
  egress:
    {{- if .Values.syntheticJourney.networkPolicy.allowApiServiceEgress }}
    - to:
        - podSelector:
            matchLabels:
              {{- include "password-vault.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ .Values.service.port }}
    {{- end }}
    {{- range .Values.syntheticJourney.networkPolicy.externalEgress }}
    - to:
        - ipBlock:
            cidr: {{ .cidr | quote }}
      ports:
        {{- range .ports }}
        - protocol: TCP
          port: {{ . }}
        {{- end }}
    {{- end }}
    {{- if .Values.networkPolicy.dns.enabled }}
    - to:
        - namespaceSelector:
            {{- toYaml .Values.networkPolicy.dns.kubeDns.namespaceSelector | nindent 12 }}
          podSelector:
            {{- toYaml .Values.networkPolicy.dns.kubeDns.podSelector | nindent 12 }}
      ports:
        - protocol: UDP
          port: {{ .Values.networkPolicy.dns.port }}
        - protocol: TCP
          port: {{ .Values.networkPolicy.dns.port }}
    {{- if .Values.networkPolicy.dns.nodeLocal.enabled }}
    - to:
        - ipBlock:
            cidr: {{ .Values.networkPolicy.dns.nodeLocal.cidr | quote }}
      ports:
        - protocol: UDP
          port: {{ .Values.networkPolicy.dns.port }}
        - protocol: TCP
          port: {{ .Values.networkPolicy.dns.port }}
    {{- end }}
    {{- end }}
{{- end }}
{{- end }}
