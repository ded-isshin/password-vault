namespaceOverride: ""
nameOverride: ""

image:
  repository: ghcr.io/ded-isshin/password-vault-api
  tag: ""
  digest: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []

replicaCount: 3

service:
  type: ClusterIP
  port: 8080
  metricsPort: 9090

config:
  bindAddr: 0.0.0.0:8080
  metricsBindAddr: 0.0.0.0:9090
  requireDatabase: true
  runMigrationsOnStartup: false
  rustLog: password_vault_api=info

database:
  urlSecret:
    name: password-vault-database
    key: url

syntheticMetadata:
  keySecret:
    name: password-vault-auth
    key: synthetic-metadata-key-b64

totpSeed:
  keySecret:
    name: password-vault-auth
    key: totp-seed-key-b64

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 384Mi

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 10001
  runAsGroup: 10001
  fsGroup: 10001
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

tmp:
  enabled: true
  mountPath: /tmp
  sizeLimit: 64Mi

migrations:
  job:
    enabled: false
    backoffLimit: 1
    activeDeadlineSeconds: 300
    ttlSecondsAfterFinished: null
    annotations: {}
    argocdHook:
      enabled: false
      generateName: true
      phase: PreSync
      syncWave: "-1"
      deletePolicy: HookSucceeded
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 384Mi

syntheticCleanup:
  cronJob:
    enabled: false
    schedule: "17 3 * * *"
    timeZone: Etc/UTC
    suspend: false
    concurrencyPolicy: Forbid
    startingDeadlineSeconds: 600
    successfulJobsHistoryLimit: 1
    failedJobsHistoryLimit: 3
    backoffLimit: 1
    activeDeadlineSeconds: 300
    ttlSecondsAfterFinished: null
    annotations: {}
    confirm: false
    prefix: synthetic
    domain: loadtest.invalid
    minAgeHours: 24
    maxDelete: 100
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 250m
        memory: 256Mi

rollout:
  minReadySeconds: 10
  progressDeadlineSeconds: 120
  terminationGracePeriodSeconds: 30
  preStopDelaySeconds: 5
  maxUnavailable: 0
  maxSurge: 1

podDisruptionBudget:
  enabled: true
  maxUnavailable: 1

topologySpreadConstraints:
  enabled: true
  maxSkew: 1
  topologyKey: kubernetes.io/hostname
  whenUnsatisfiable: ScheduleAnyway
  matchLabelKeys:
    - pod-template-hash
  nodeAffinityPolicy: Honor
  nodeTaintsPolicy: Honor

ingress:
  enabled: false
  className: nginx
  host: ""
  annotations: {}
  path: /

networkPolicy:
  enabled: false
  http:
    # The current edge NGINX path reaches the API through the Kubernetes
    # LoadBalancer, so HTTP ingress remains source-open at the pod policy layer.
    # Metrics ingress is restricted separately below.
    # Setting this to false also blocks kubelet HTTP probes unless a replacement
    # in-cluster ingress/probe allow-list is designed and tested.
    allowAllIngress: true
  metrics:
    namespaceSelector:
      matchLabels:
        kubernetes.io/metadata.name: observability
    podSelector:
      matchLabels:
        app.kubernetes.io/name: vmagent
  database:
    port: 5432
    podSelector:
      matchLabels:
        app.kubernetes.io/name: password-vault-postgres
        app.kubernetes.io/part-of: password-vault
    podSelectorOverride: {}
  dns:
    enabled: true
    port: 53
    kubeDns:
      namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
      podSelector:
        matchLabels:
          k8s-app: kube-dns
    nodeLocal:
      enabled: true
      cidr: 169.254.25.10/32

observability:
  vmServiceScrape:
    enabled: false
    namespace: observability
