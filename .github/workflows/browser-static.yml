---
name: browser-static

"on":
  pull_request:
    paths:
      - .github/workflows/browser-static.yml
      - crates/api/static/**
      - load/synthetic/**
  push:
    branches:
      - main
    paths:
      - .github/workflows/browser-static.yml
      - crates/api/static/**
      - load/synthetic/**

permissions:
  contents: read

jobs:
  browser-static:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Check browser scripts
        run: |
          set -euo pipefail
          node --check crates/api/static/app.js
          node --check load/synthetic/browser-api-journey.mjs
          node --check load/synthetic/browser-checkpoint-self-test.mjs
          SYNTHETIC_SELF_TEST_ONLY=true node load/synthetic/browser-api-journey.mjs
          node load/synthetic/browser-checkpoint-self-test.mjs
