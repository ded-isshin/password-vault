name: helm

on:
  pull_request:
    paths:
      - .github/workflows/helm.yml
      - deploy/helm/**
  push:
    branches:
      - main
    paths:
      - .github/workflows/helm.yml
      - deploy/helm/**

permissions:
  contents: read

jobs:
  helm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Lint and render chart
        run: |
          set -euo pipefail
          cmp load/synthetic/browser-api-journey.mjs deploy/helm/password-vault/files/synthetic/browser-api-journey.mjs
          docker run --rm -v "$PWD":/workspace -w /workspace alpine/helm:3.19.0 \
            lint deploy/helm/password-vault
          docker run --rm -v "$PWD":/workspace -w /workspace alpine/helm:3.19.0 \
            template password-vault deploy/helm/password-vault \
            --namespace password-vault \
            --set image.tag=ci \
            --set observability.vmServiceScrape.enabled=true \
            >/tmp/password-vault-rendered.yaml
          test -s /tmp/password-vault-rendered.yaml
          grep -q 'name: password-vault-api-metrics' /tmp/password-vault-rendered.yaml
          grep -q 'name: PV_METRICS_BIND_ADDR' /tmp/password-vault-rendered.yaml
          grep -q 'name: metrics' /tmp/password-vault-rendered.yaml
          grep -q 'port: metrics' /tmp/password-vault-rendered.yaml
          grep -q 'matchLabelKeys:' /tmp/password-vault-rendered.yaml
          grep -q -- '- pod-template-hash' /tmp/password-vault-rendered.yaml
          grep -q 'nodeAffinityPolicy: Honor' /tmp/password-vault-rendered.yaml
          grep -q 'nodeTaintsPolicy: Honor' /tmp/password-vault-rendered.yaml
          docker run --rm -v "$PWD":/workspace -w /workspace alpine/helm:3.19.0 \
            template password-vault deploy/helm/password-vault \
            --namespace password-vault \
            --set image.tag=ci \
            --set networkPolicy.enabled=true \
            >/tmp/password-vault-networkpolicy-rendered.yaml
          grep -q 'kind: NetworkPolicy' /tmp/password-vault-networkpolicy-rendered.yaml
          grep -q 'name: password-vault-api' /tmp/password-vault-networkpolicy-rendered.yaml
          grep -q 'app.kubernetes.io/name: vmagent' /tmp/password-vault-networkpolicy-rendered.yaml
          grep -q 'kubernetes.io/metadata.name: observability' /tmp/password-vault-networkpolicy-rendered.yaml
          grep -q 'app.kubernetes.io/name: password-vault-postgres' /tmp/password-vault-networkpolicy-rendered.yaml
          grep -q 'k8s-app: kube-dns' /tmp/password-vault-networkpolicy-rendered.yaml
          grep -q 'cidr: "169.254.25.10/32"' /tmp/password-vault-networkpolicy-rendered.yaml
          grep -q 'port: 5432' /tmp/password-vault-networkpolicy-rendered.yaml
          grep -q 'port: 53' /tmp/password-vault-networkpolicy-rendered.yaml
          ! grep -q -- '- {}' /tmp/password-vault-networkpolicy-rendered.yaml
          docker run --rm -v "$PWD":/workspace -w /workspace alpine/helm:3.19.0 \
            template password-vault deploy/helm/password-vault \
            --namespace password-vault \
            --set image.tag=ci \
            --set networkPolicy.enabled=true \
            --set-string 'networkPolicy.database.podSelectorOverride.matchLabels.cnpg\.io/cluster=password-vault-cnpg' \
            >/tmp/password-vault-networkpolicy-cnpg-rendered.yaml
          grep -q 'cnpg.io/cluster: password-vault-cnpg' /tmp/password-vault-networkpolicy-cnpg-rendered.yaml
          ! grep -q 'app.kubernetes.io/name: password-vault-postgres' /tmp/password-vault-networkpolicy-cnpg-rendered.yaml
          cat >/tmp/password-vault-no-match-label-keys-values.yaml <<'YAML'
          topologySpreadConstraints:
            matchLabelKeys: []
          YAML
          docker run --rm -v "$PWD":/workspace -v /tmp:/tmp -w /workspace alpine/helm:3.19.0 \
            template password-vault deploy/helm/password-vault \
            --namespace password-vault \
            --set image.tag=ci \
            -f /tmp/password-vault-no-match-label-keys-values.yaml \
            >/tmp/password-vault-no-match-label-keys-rendered.yaml
          ! grep -q 'matchLabelKeys:' /tmp/password-vault-no-match-label-keys-rendered.yaml
          docker run --rm -v "$PWD":/workspace -w /workspace alpine/helm:3.19.0 \
            template password-vault deploy/helm/password-vault \
            --namespace password-vault \
            --set image.tag=ci \
            --set migrations.job.enabled=true \
            --set migrations.job.argocdHook.enabled=true \
            >/tmp/password-vault-migration-job-rendered.yaml
          grep -q 'kind: Job' /tmp/password-vault-migration-job-rendered.yaml
          grep -q 'generateName: password-vault-migrate-' /tmp/password-vault-migration-job-rendered.yaml
          ! grep -q '^  name: password-vault-migrate$' /tmp/password-vault-migration-job-rendered.yaml
          grep -q 'argocd.argoproj.io/hook: "PreSync"' /tmp/password-vault-migration-job-rendered.yaml
          grep -q 'argocd.argoproj.io/hook-delete-policy: "HookSucceeded"' /tmp/password-vault-migration-job-rendered.yaml
          grep -q 'argocd.argoproj.io/sync-wave: "-1"' /tmp/password-vault-migration-job-rendered.yaml
          grep -q 'restartPolicy: Never' /tmp/password-vault-migration-job-rendered.yaml
          grep -q 'automountServiceAccountToken: false' /tmp/password-vault-migration-job-rendered.yaml
          grep -q -- '- migrate' /tmp/password-vault-migration-job-rendered.yaml
          grep -q 'name: PV_DATABASE_URL' /tmp/password-vault-migration-job-rendered.yaml
          grep -q 'secretKeyRef:' /tmp/password-vault-migration-job-rendered.yaml
          ! grep -q 'ttlSecondsAfterFinished' /tmp/password-vault-migration-job-rendered.yaml
          docker run --rm -v "$PWD":/workspace -w /workspace alpine/helm:3.19.0 \
            template password-vault deploy/helm/password-vault \
            --namespace password-vault \
            --set image.tag=ci \
            --set networkPolicy.enabled=true \
            --set syntheticCleanup.cronJob.enabled=true \
            >/tmp/password-vault-synthetic-cleanup-rendered.yaml
          grep -q 'kind: CronJob' /tmp/password-vault-synthetic-cleanup-rendered.yaml
          grep -q 'kind: NetworkPolicy' /tmp/password-vault-synthetic-cleanup-rendered.yaml
          grep -q 'name: password-vault-synthetic-cleanup' /tmp/password-vault-synthetic-cleanup-rendered.yaml
          grep -Fq 'schedule: "17 3 * * *"' /tmp/password-vault-synthetic-cleanup-rendered.yaml
          grep -q 'timeZone: "Etc/UTC"' /tmp/password-vault-synthetic-cleanup-rendered.yaml
          grep -q 'concurrencyPolicy: Forbid' /tmp/password-vault-synthetic-cleanup-rendered.yaml
          grep -q 'successfulJobsHistoryLimit: 1' /tmp/password-vault-synthetic-cleanup-rendered.yaml
          grep -q 'failedJobsHistoryLimit: 3' /tmp/password-vault-synthetic-cleanup-rendered.yaml
          grep -q 'automountServiceAccountToken: false' /tmp/password-vault-synthetic-cleanup-rendered.yaml
          grep -q -- '- cleanup-synthetic' /tmp/password-vault-synthetic-cleanup-rendered.yaml
          grep -q -- '- --dry-run' /tmp/password-vault-synthetic-cleanup-rendered.yaml
          grep -q 'component: synthetic-cleanup' /tmp/password-vault-synthetic-cleanup-rendered.yaml
          grep -q 'policyTypes:' /tmp/password-vault-synthetic-cleanup-rendered.yaml
          grep -q -- '- Egress' /tmp/password-vault-synthetic-cleanup-rendered.yaml
          grep -q 'port: 5432' /tmp/password-vault-synthetic-cleanup-rendered.yaml
          grep -q 'port: 53' /tmp/password-vault-synthetic-cleanup-rendered.yaml
          grep -q 'name: PV_DATABASE_URL' /tmp/password-vault-synthetic-cleanup-rendered.yaml
          grep -q 'name: PV_SYNTHETIC_CLEANUP_DOMAIN' /tmp/password-vault-synthetic-cleanup-rendered.yaml
          grep -q 'value: "loadtest.invalid"' /tmp/password-vault-synthetic-cleanup-rendered.yaml
          docker run --rm -v "$PWD":/workspace -w /workspace alpine/helm:3.19.0 \
            template password-vault deploy/helm/password-vault \
            --namespace password-vault \
            --set image.tag=ci \
            --set syntheticCleanup.cronJob.enabled=true \
            --set syntheticCleanup.cronJob.confirm=true \
            >/tmp/password-vault-synthetic-cleanup-confirm-rendered.yaml
          grep -q -- '- --confirm' /tmp/password-vault-synthetic-cleanup-confirm-rendered.yaml
          ! grep -q -- '- --dry-run' /tmp/password-vault-synthetic-cleanup-confirm-rendered.yaml
          ! docker run --rm -v "$PWD":/workspace -w /workspace alpine/helm:3.19.0 \
            template password-vault deploy/helm/password-vault \
            --namespace password-vault \
            --set image.tag=ci \
            --set syntheticCleanup.cronJob.enabled=true \
            --set syntheticCleanup.cronJob.domain=example.com
          ! docker run --rm -v "$PWD":/workspace -w /workspace alpine/helm:3.19.0 \
            template password-vault deploy/helm/password-vault \
            --namespace password-vault \
            --set image.tag=ci \
            --set syntheticCleanup.cronJob.enabled=true \
            --set syntheticCleanup.cronJob.domain='bad..invalid'
          docker run --rm -v "$PWD":/workspace -w /workspace alpine/helm:3.19.0 \
            template password-vault deploy/helm/password-vault \
            --namespace password-vault \
            --set image.tag=ci \
            --set networkPolicy.enabled=true \
            --set syntheticJourney.cronJob.enabled=true \
            --set syntheticJourney.cronJob.baseUrl=http://password-vault-api.password-vault.svc.cluster.local:8080 \
            --set syntheticJourney.networkPolicy.externalEgress[0].cidr=192.0.2.10/32 \
            --set syntheticJourney.networkPolicy.externalEgress[0].ports[0]=11443 \
            >/tmp/password-vault-synthetic-journey-rendered.yaml
          grep -q 'kind: ConfigMap' /tmp/password-vault-synthetic-journey-rendered.yaml
          grep -q 'kind: CronJob' /tmp/password-vault-synthetic-journey-rendered.yaml
          grep -q 'kind: NetworkPolicy' /tmp/password-vault-synthetic-journey-rendered.yaml
          grep -q 'name: password-vault-synthetic-journey' /tmp/password-vault-synthetic-journey-rendered.yaml
          grep -q 'component: synthetic-journey' /tmp/password-vault-synthetic-journey-rendered.yaml
          grep -q 'browser-api-journey.mjs' /tmp/password-vault-synthetic-journey-rendered.yaml
          grep -q 'node:22-bookworm-slim@sha256:7af03b14a13c8cdd38e45058fd957bf00a72bbe17feac43b1c15a689c029c732' /tmp/password-vault-synthetic-journey-rendered.yaml
          grep -q 'name: BASE_URL' /tmp/password-vault-synthetic-journey-rendered.yaml
          grep -q 'value: "http://password-vault-api.password-vault.svc.cluster.local:8080"' /tmp/password-vault-synthetic-journey-rendered.yaml
          grep -q 'name: SYNTHETIC_ALLOW_NON_LOCAL_BASE_URL' /tmp/password-vault-synthetic-journey-rendered.yaml
          grep -q 'name: SYNTHETIC_TLS_INSECURE' /tmp/password-vault-synthetic-journey-rendered.yaml
          grep -q 'name: SYNTHETIC_CHECK_METRICS' /tmp/password-vault-synthetic-journey-rendered.yaml
          grep -q 'name: SYNTHETIC_EMAIL_DOMAIN' /tmp/password-vault-synthetic-journey-rendered.yaml
          grep -q 'value: "loadtest.invalid"' /tmp/password-vault-synthetic-journey-rendered.yaml
          grep -q 'automountServiceAccountToken: false' /tmp/password-vault-synthetic-journey-rendered.yaml
          grep -q 'readOnly: true' /tmp/password-vault-synthetic-journey-rendered.yaml
          grep -q 'cidr: "192.0.2.10/32"' /tmp/password-vault-synthetic-journey-rendered.yaml
          grep -q 'port: 11443' /tmp/password-vault-synthetic-journey-rendered.yaml
          grep -q 'port: 8080' /tmp/password-vault-synthetic-journey-rendered.yaml
          grep -q 'port: 53' /tmp/password-vault-synthetic-journey-rendered.yaml
          python3 - <<'PY'
          from pathlib import Path

          rendered = Path("/tmp/password-vault-synthetic-journey-rendered.yaml").read_text()
          expected = """  egress:
              - to:
                  - podSelector:
                      matchLabels:
                        app.kubernetes.io/name: password-vault
                        app.kubernetes.io/instance: password-vault
                        component: api
                ports:
                  - protocol: TCP
                    port: 8080
          """
          if expected not in rendered:
              raise SystemExit("synthetic journey NetworkPolicy API egress selector is not rendered with matchLabels")
          PY
          ! docker run --rm -v "$PWD":/workspace -w /workspace alpine/helm:3.19.0 \
            template password-vault deploy/helm/password-vault \
            --namespace password-vault \
            --set image.tag=ci \
            --set syntheticJourney.cronJob.enabled=true
          ! docker run --rm -v "$PWD":/workspace -w /workspace alpine/helm:3.19.0 \
            template password-vault deploy/helm/password-vault \
            --namespace password-vault \
            --set image.tag=ci \
            --set syntheticJourney.cronJob.enabled=true \
            --set syntheticJourney.cronJob.baseUrl=http://password-vault-api.password-vault.svc.cluster.local:8080 \
            --set syntheticJourney.cronJob.emailDomain=example.com
          ! docker run --rm -v "$PWD":/workspace -w /workspace alpine/helm:3.19.0 \
            template password-vault deploy/helm/password-vault \
            --namespace password-vault \
            --set image.tag=ci \
            --set syntheticJourney.cronJob.enabled=true \
            --set syntheticJourney.cronJob.baseUrl=http://password-vault-api.password-vault.svc.cluster.local:8080 \
            --set syntheticJourney.networkPolicy.externalEgress[0].cidr=not-a-cidr \
            --set syntheticJourney.networkPolicy.externalEgress[0].ports[0]=11443
          ! docker run --rm -v "$PWD":/workspace -w /workspace alpine/helm:3.19.0 \
            template password-vault deploy/helm/password-vault \
            --namespace password-vault \
            --set image.tag=ci \
            --set syntheticJourney.cronJob.enabled=true \
            --set syntheticJourney.cronJob.baseUrl=http://password-vault-api.password-vault.svc.cluster.local:8080 \
            --set syntheticJourney.networkPolicy.externalEgress[0].cidr=0.0.0.0/0 \
            --set syntheticJourney.networkPolicy.externalEgress[0].ports[0]=11443
          ! docker run --rm -v "$PWD":/workspace -w /workspace alpine/helm:3.19.0 \
            template password-vault deploy/helm/password-vault \
            --namespace password-vault \
            --set image.tag=ci \
            --set migrations.job.enabled=true
