name: container

on:
  pull_request:
    paths:
      - .dockerignore
      - .github/workflows/container.yml
      - Cargo.lock
      - Cargo.toml
      - Dockerfile
      - crates/**
      - load/**
      - migrations/**
  push:
    branches:
      - main
    paths:
      - .dockerignore
      - .github/workflows/container.yml
      - Cargo.lock
      - Cargo.toml
      - Dockerfile
      - crates/**
      - load/**
      - migrations/**

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ded-isshin/password-vault-api
  RUST_IMAGE_UPSTREAM: docker.io/library/rust:1.96.0-bookworm@sha256:13c186980fa33cc12759b429662a1322939dbe697484b7c33b47dd2698d28460
  RUST_IMAGE_MIRROR: ghcr.io/ded-isshin/password-vault-base-rust:1.96.0-bookworm-sha256-13c186980fa33cc12759b429662a1322939dbe697484b7c33b47dd2698d28460
  RUNTIME_IMAGE_UPSTREAM: docker.io/library/debian:bookworm-slim@sha256:0104b334637a5f19aa9c983a91b54c89887c0984081f2068983107a6f6c21eeb
  RUNTIME_IMAGE_MIRROR: ghcr.io/ded-isshin/password-vault-base-debian:bookworm-slim-sha256-0104b334637a5f19aa9c983a91b54c89887c0984081f2068983107a6f6c21eeb
  NODE_SYNTHETIC_IMAGE_UPSTREAM: docker.io/library/node:22-bookworm-slim@sha256:7af03b14a13c8cdd38e45058fd957bf00a72bbe17feac43b1c15a689c029c732
  NODE_SYNTHETIC_IMAGE_MIRROR: ghcr.io/ded-isshin/password-vault-ci-node:22-bookworm-slim-sha256-7af03b14a13c8cdd38e45058fd957bf00a72bbe17feac43b1c15a689c029c732
  K6_IMAGE_UPSTREAM: docker.io/grafana/k6:2.0.0@sha256:a33a0cfdc4d2483d6b7a3a22e726a499ff2831a671a49239104cd34a9937523c
  K6_IMAGE_MIRROR: ghcr.io/ded-isshin/password-vault-ci-k6:2.0.0-sha256-a33a0cfdc4d2483d6b7a3a22e726a499ff2831a671a49239104cd34a9937523c
  TEST_SYNTHETIC_METADATA_KEY_B64: MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY
  TEST_SYNTHETIC_TRAFFIC_TOKEN: ci-synthetic-token-0123456789abcdef
  TEST_TOTP_SEED_KEY_B64: YmNkZWYwMTIzNDU2Nzg5YWJjZGVmMDEyMzQ1Njc4OWE

jobs:
  pr-smoke:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    services:
      postgres:
        image: postgres:18-bookworm@sha256:501c9112cb737119b90618d7c09ad4eaab243e4b370050eb280061284cd2ed63
        env:
          POSTGRES_DB: password_vault_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d password_vault_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Prefer GHCR image mirrors
        id: images
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          echo "$GITHUB_TOKEN" \
            | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin \
              >/dev/null 2>&1 || true

          choose_image() {
            local output_name="$1"
            local mirror="$2"
            local upstream="$3"

            if docker buildx imagetools inspect "$mirror" >/dev/null 2>&1; then
              echo "${output_name}=${mirror}" >>"$GITHUB_OUTPUT"
              echo "Using GHCR mirror for ${output_name}: ${mirror}"
            else
              echo "${output_name}=${upstream}" >>"$GITHUB_OUTPUT"
              echo "Mirror unavailable for ${output_name}; using pinned upstream ${upstream}"
            fi
          }

          choose_image rust_image "$RUST_IMAGE_MIRROR" "$RUST_IMAGE_UPSTREAM"
          choose_image runtime_image "$RUNTIME_IMAGE_MIRROR" "$RUNTIME_IMAGE_UPSTREAM"
          choose_image node_synthetic_image \
            "$NODE_SYNTHETIC_IMAGE_MIRROR" "$NODE_SYNTHETIC_IMAGE_UPSTREAM"
          choose_image k6_image "$K6_IMAGE_MIRROR" "$K6_IMAGE_UPSTREAM"

      - name: Build container image for PR smoke
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          build-args: |
            BUILD_REVISION=${{ github.sha }}
            RUST_IMAGE=${{ steps.images.outputs.rust_image }}
            RUNTIME_IMAGE=${{ steps.images.outputs.runtime_image }}
          load: true
          tags: password-vault-api:ci-smoke

      - name: Smoke test PR image
        shell: bash
        run: |
          set -euo pipefail
          ! docker run --rm password-vault-api:ci-smoke unexpected-command
          ! docker run --rm \
            -e PV_DATABASE_URL=not-a-postgres-url \
            password-vault-api:ci-smoke migrate
          docker run --rm --network host \
            -e PV_DATABASE_URL=postgres://postgres:postgres@127.0.0.1:5432/password_vault_test \
            password-vault-api:ci-smoke migrate
          docker run --rm --network host \
            -e PV_DATABASE_URL=postgres://postgres:postgres@127.0.0.1:5432/password_vault_test \
            password-vault-api:ci-smoke cleanup-synthetic --dry-run \
            | grep 'synthetic_cleanup dry_run=true'
          docker run -d --rm --name password-vault-api-smoke --network host \
            -e PV_BIND_ADDR=127.0.0.1:8080 \
            -e PV_METRICS_BIND_ADDR=127.0.0.1:9090 \
            -e PV_DATABASE_URL=postgres://postgres:postgres@127.0.0.1:5432/password_vault_test \
            -e PV_REQUIRE_DATABASE=true \
            -e PV_RUN_MIGRATIONS_ON_STARTUP=false \
            -e PV_SYNTHETIC_METADATA_KEY_B64="${TEST_SYNTHETIC_METADATA_KEY_B64}" \
            -e PV_SYNTHETIC_TRAFFIC_TOKEN="${TEST_SYNTHETIC_TRAFFIC_TOKEN}" \
            -e PV_TOTP_SEED_KEY_B64="${TEST_TOTP_SEED_KEY_B64}" \
            password-vault-api:ci-smoke
          trap 'docker rm -f password-vault-api-smoke >/dev/null 2>&1 || true' EXIT
          for _ in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:8080/readyz >/dev/null; then
              break
            fi
            sleep 1
          done
          curl -fsS http://127.0.0.1:8080/healthz
          curl -fsS http://127.0.0.1:8080/readyz
          test "$(curl -sS -o /dev/null -w '%{http_code}' http://127.0.0.1:8080/metrics)" = "404"
          curl -fsS http://127.0.0.1:9090/metrics | grep -E 'axum_http_requests_total|axum_http_requests_duration_seconds'
          curl -fsS http://127.0.0.1:9090/metrics \
            | grep 'password_vault_build_info' \
            | grep "revision=\"${GITHUB_SHA}\""
          docker run --rm --network host \
            -v "$PWD:/workspace:ro" \
            -w /workspace \
            -e BASE_URL=http://127.0.0.1:8080 \
            -e METRICS_BASE_URL=http://127.0.0.1:9090 \
            -e RUN_ID=ci-${{ github.run_id }}-${{ github.run_attempt }} \
            -e SYNTHETIC_TIMEOUT_MS=120000 \
            "${{ steps.images.outputs.node_synthetic_image }}" \
            node --check load/synthetic/browser-api-journey.mjs
          grep -Fq \
            "X-Password-Vault-Traffic-Class': 'synthetic'" \
            load/k6/lib/data.js
          docker run --rm --network host \
            -v "$PWD:/workspace:ro" \
            -w /workspace \
            -e BASE_URL=http://127.0.0.1:8080 \
            -e METRICS_BASE_URL=http://127.0.0.1:9090 \
            -e RUN_ID=ci-${{ github.run_id }}-${{ github.run_attempt }} \
            -e SYNTHETIC_TRAFFIC_TOKEN="${TEST_SYNTHETIC_TRAFFIC_TOKEN}" \
            -e SYNTHETIC_TIMEOUT_MS=120000 \
            "${{ steps.images.outputs.node_synthetic_image }}" \
            node load/synthetic/browser-api-journey.mjs
          docker run --rm --network host \
            -v "$PWD/load/k6:/scripts:ro" \
            -w /scripts \
            -e BASE_URL=http://127.0.0.1:8080 \
            -e METRICS_BASE_URL=http://127.0.0.1:9090 \
            -e RUN_ID=ci-${{ github.run_id }} \
            -e SYNTHETIC_TRAFFIC_TOKEN="${TEST_SYNTHETIC_TRAFFIC_TOKEN}" \
            -e LOAD_RATE=2 \
            -e LOAD_DURATION=15s \
            "${{ steps.images.outputs.k6_image }}" run scenarios/smoke.js

  publish:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      attestations: write
      contents: read
      id-token: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=ref,event=tag

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prefer GHCR base image mirrors
        id: images
        shell: bash
        run: |
          set -euo pipefail

          choose_image() {
            local output_name="$1"
            local mirror="$2"
            local upstream="$3"

            if docker buildx imagetools inspect "$mirror" >/dev/null 2>&1; then
              echo "${output_name}=${mirror}" >>"$GITHUB_OUTPUT"
              echo "Using GHCR mirror for ${output_name}: ${mirror}"
            else
              echo "${output_name}=${upstream}" >>"$GITHUB_OUTPUT"
              echo "Mirror unavailable for ${output_name}; using pinned upstream ${upstream}"
            fi
          }

          choose_image rust_image "$RUST_IMAGE_MIRROR" "$RUST_IMAGE_UPSTREAM"
          choose_image runtime_image "$RUNTIME_IMAGE_MIRROR" "$RUNTIME_IMAGE_UPSTREAM"

      - name: Build and publish container image
        id: build-push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          build-args: |
            BUILD_REVISION=${{ github.sha }}
            RUST_IMAGE=${{ steps.images.outputs.rust_image }}
            RUNTIME_IMAGE=${{ steps.images.outputs.runtime_image }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Attest published image
        uses: actions/attest@v4
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build-push.outputs.digest }}
          push-to-registry: true
