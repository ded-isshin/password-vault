name: container

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ded-isshin/password-vault-api
  TEST_SYNTHETIC_METADATA_KEY_B64: MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY

jobs:
  pr-smoke:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    services:
      postgres:
        image: postgres:17-bookworm
        env:
          POSTGRES_DB: password_vault_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d password_vault_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build container image for PR smoke
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          load: true
          tags: password-vault-api:ci-smoke

      - name: Smoke test PR image
        shell: bash
        run: |
          set -euo pipefail
          docker run -d --rm --name password-vault-api-smoke --network host \
            -e PV_BIND_ADDR=127.0.0.1:8080 \
            -e PV_DATABASE_URL=postgres://postgres:postgres@127.0.0.1:5432/password_vault_test \
            -e PV_REQUIRE_DATABASE=true \
            -e PV_RUN_MIGRATIONS_ON_STARTUP=true \
            -e PV_SYNTHETIC_METADATA_KEY_B64="${TEST_SYNTHETIC_METADATA_KEY_B64}" \
            password-vault-api:ci-smoke
          trap 'docker rm -f password-vault-api-smoke >/dev/null 2>&1 || true' EXIT
          for _ in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:8080/readyz >/dev/null; then
              break
            fi
            sleep 1
          done
          curl -fsS http://127.0.0.1:8080/healthz
          curl -fsS http://127.0.0.1:8080/readyz
          curl -fsS http://127.0.0.1:8080/metrics | grep -E 'axum_http_requests_total|axum_http_requests_duration_seconds'
          docker run --rm --network host \
            -v "$PWD/load/k6:/scripts:ro" \
            -w /scripts \
            -e BASE_URL=http://127.0.0.1:8080 \
            -e RUN_ID=ci-${{ github.run_id }} \
            -e LOAD_RATE=2 \
            -e LOAD_DURATION=15s \
            grafana/k6:2.0.0 run scenarios/smoke.js

  publish:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      attestations: write
      contents: read
      id-token: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=ref,event=tag

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish container image
        id: build-push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Attest published image
        uses: actions/attest@v4
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build-push.outputs.digest }}
          push-to-registry: true
