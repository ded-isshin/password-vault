name: docs

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check required docs
        run: |
          set -euo pipefail
          test -f README.md
          test -f AGENTS.md
          test -f SECURITY.md
          test -f CONTRIBUTING.md
          test -f docs/product-brief.md
          test -f docs/architecture.md
          test -f docs/threat-model.md
