name: rust

on:
  pull_request:
    paths:
      - .github/workflows/rust.yml
      - Cargo.lock
      - Cargo.toml
      - crates/**
      - migrations/**
      - rust-toolchain.toml
  push:
    branches:
      - main
    paths:
      - .github/workflows/rust.yml
      - Cargo.lock
      - Cargo.toml
      - crates/**
      - migrations/**
      - rust-toolchain.toml

permissions:
  contents: read

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Test workspace
        shell: bash
        run: |
          set -euo pipefail
          rustup toolchain install 1.96.0 --profile minimal
          rustup component add rustfmt clippy --toolchain 1.96.0
          rustc +1.96.0 --version
          cargo +1.96.0 --version
          cargo +1.96.0 fetch --locked
          cargo +1.96.0 fmt --all -- --check
          cargo +1.96.0 clippy --locked --workspace --all-targets -- -D warnings
          cargo +1.96.0 test --locked --workspace

  postgres-migrations:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18-bookworm
        env:
          POSTGRES_DB: password_vault_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d password_vault_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      PV_TEST_DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/password_vault_test
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Test PostgreSQL migrations
        shell: bash
        run: |
          set -euo pipefail
          rustup toolchain install 1.96.0 --profile minimal
          rustc +1.96.0 --version
          cargo +1.96.0 --version
          cargo +1.96.0 fetch --locked
          cargo +1.96.0 test --locked --workspace -- --test-threads=1
